<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <form action="">
        <h1>Register</h1>
        <label for="text">
            Username <input id="text" type="text" placeholder="Username...">
        </label><br><br>
        <label for="password">
            Password<input id="password" type="password" placeholder="Password...">
        </label><br><br>
        Choose your gender: <br><br>
        <label for="radio">
            <input type="radio" name="gender" id="radio">Male
        </label><br><br>
        <label for="radio">
            <input type="radio" name="gender" id="radio">Female
        </label><br><br>

        <label for="checkbox">
            <input type="checkbox">Accept All Terms
        </label><br><br>
        <label for="submit">
            <input type="submit" value="Sign up"  id="submit">
        </label><br><br>
        <label for="reset">
            <input type="reset"  id="reset">
        </label><br><br>
        <a href="login.html">Already have you got account?</a>



    </form>
</body>
</html>
